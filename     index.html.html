<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ゆるねこ一言帖</title>
<style>
:root{--bg:#edfaff;--card:#fff;--ink:#2b2f3a;--muted:#6e7882;--line:#d3edf6;--blue:#78c7df;--blue-dark:#347b91;--soft:#f7fdff;--danger:#c45b5b;--shadow:0 16px 40px rgba(91,148,166,.18)}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--ink);background:radial-gradient(circle at top left,#d8f6ff 0,transparent 45%),linear-gradient(180deg,#f8fdff 0%,var(--bg) 100%)}
.app{width:min(760px,100%);margin:0 auto;padding:24px 16px 48px}.hero,.panel{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}.hero{padding:26px 24px}
.eyebrow{margin:0 0 8px;color:var(--blue-dark);font-weight:800;letter-spacing:.14em;font-size:.78rem}h1{font-size:2.3rem;line-height:1.08;margin:0 0 12px}h2{margin:0 0 18px;font-size:1.35rem}.hero p:last-child{margin:0;color:var(--muted);line-height:1.75}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}button{font:inherit;border:0;border-radius:999px;padding:13px 14px;font-weight:750}.tab,.ghost,.mini{background:rgba(255,255,255,.9);color:var(--blue-dark);border:1px solid var(--line)}.tab.active,.primary,.mini.active{background:var(--blue);color:#fff;box-shadow:0 8px 20px rgba(74,157,184,.22)}
.panel{display:none;padding:22px}.panel.active{display:block}label{display:block;margin:0 0 18px}label span{display:block;font-weight:800;margin:0 0 8px}input,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:14px 16px;font:inherit;background:#fff;color:var(--ink)}textarea{resize:vertical}input:focus,textarea:focus{outline:3px solid rgba(120,199,223,.25);border-color:var(--blue)}
.previewWrap{margin:-8px 0 18px;background:var(--soft);border:1px dashed var(--line);border-radius:22px;padding:10px}.previewWrap img{width:100%;max-height:360px;object-fit:cover;border-radius:16px;display:block}.hidden{display:none}.actions{display:flex;gap:10px;flex-wrap:wrap}.sectionHead{display:flex;justify-content:space-between;align-items:center;gap:12px}.count{color:var(--blue-dark);font-weight:800}.search{margin-bottom:12px}.filterRow{display:flex;gap:8px;margin:0 0 14px}.mini{padding:9px 14px;font-size:.9rem}.empty{color:var(--muted);background:var(--soft);border-radius:18px;padding:16px}.entries{display:grid;gap:16px}.entry{border:1px solid var(--line);border-radius:24px;padding:16px;background:#fff}.entryTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.entry time{color:var(--muted);font-weight:700;font-size:.86rem}.entry h3{margin:6px 0 10px;white-space:pre-wrap;line-height:1.6}.fav{background:#fff7c7;color:#9d7b00;min-width:44px}.fav.on{background:#ffe88a}.photoGrid{display:grid;grid-template-columns:1fr;gap:10px;margin:10px 0}.photoGrid img{width:100%;max-height:360px;object-fit:cover;border-radius:18px}.reading,.memo{white-space:pre-wrap;line-height:1.7;color:var(--muted);margin:10px 0 0}.tagList{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.tag{background:#e9f9fe;color:var(--blue-dark);border-radius:999px;padding:6px 10px;font-size:.85rem;font-weight:700}.deleteBtn{margin-top:14px;background:#fff;color:var(--danger);border:1px solid #f0cccc;padding:9px 14px}.note{color:var(--muted);line-height:1.8}.importBox{margin-top:18px;padding:18px;background:var(--soft);border:1px solid var(--line);border-radius:22px}@media (min-width:680px){.photoGrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<main class="app">
<section class="hero"><p class="eyebrow">MY LITTLE CAT NOTE</p><h1>ゆるねこ一言帖</h1><p>今日の一枚をつくるところから。<br>あこちゃんだけの小さな展示室へ。</p></section>
<nav class="tabs"><button class="tab active" data-tab="create">つくる</button><button class="tab" data-tab="library">見る</button><button class="tab" data-tab="backup">控え</button></nav>
<section id="create" class="panel active"><h2>今日の一枚をつくる</h2><form id="entryForm">
<label><span>日付</span><input id="date" type="date" required></label>
<label><span>今日のカード写真</span><input id="cardPhoto" type="file" accept="image/*"></label><div id="cardPreviewWrap" class="previewWrap hidden"><img id="cardPreview" alt="カード写真のプレビュー"></div>
<label><span>今日のねこ写真</span><input id="catPhoto" type="file" accept="image/*"></label><div id="catPreviewWrap" class="previewWrap hidden"><img id="catPreview" alt="ねこ写真のプレビュー"></div>
<label><span>ゆるねこ一言</span><textarea id="phrase" rows="3" placeholder="例：心のコップは、八分目が歩きやすい。" required></textarea></label>
<label><span>カード解説メモ</span><textarea id="reading" rows="4" placeholder="カードのこと、今日のこと、ソラさんの解説など"></textarea></label>
<label><span>タグ</span><input id="tags" type="text" placeholder="巡航速度, お茶目, 余裕"></label>
<label><span>ひとことメモ</span><textarea id="memo" rows="3" placeholder="あとで思い出したいこと"></textarea></label>
<div class="actions"><button type="submit" class="primary">今日はこれでいい</button><button type="button" id="clearForm" class="ghost">入力を空にする</button></div>
</form></section>
<section id="library" class="panel"><div class="sectionHead"><h2>ゆるねこ図書館</h2><span id="count" class="count">0枚</span></div><input id="search" class="search" type="search" placeholder="一言・タグ・メモを検索"><div class="filterRow"><button id="showAll" class="mini active">全部</button><button id="showFav" class="mini">お気に入り</button></div><p id="empty" class="empty">まだ展示はありません。最初の一枚をつくろう。</p><div id="entries" class="entries"></div></section>
<section id="backup" class="panel"><h2>控えをとる</h2><p class="note">保存は、今のiPhoneのSafari内に置かれます。大事な作品が増えたら、控えをダウンロードしておくと安心。</p><button id="exportBtn" class="primary">控えをダウンロード</button><label class="importBox"><span>控えを読み込む</span><input id="importFile" type="file" accept="application/json"></label></section>
</main>
<template id="entryTemplate"><article class="entry"><div class="entryTop"><div><time></time><h3></h3></div><button class="fav" aria-label="お気に入り">☆</button></div><div class="photoGrid"></div><p class="reading"></p><p class="memo"></p><div class="tagList"></div><button class="deleteBtn">削除</button></article></template>
<script>
const STORAGE_KEY='yuruneko_entries_v1';
const tabs=document.querySelectorAll('.tab'),panels=document.querySelectorAll('.panel'),form=document.getElementById('entryForm'),dateInput=document.getElementById('date'),cardPhotoInput=document.getElementById('cardPhoto'),catPhotoInput=document.getElementById('catPhoto'),phraseInput=document.getElementById('phrase'),readingInput=document.getElementById('reading'),tagsInput=document.getElementById('tags'),memoInput=document.getElementById('memo'),cardPreviewWrap=document.getElementById('cardPreviewWrap'),cardPreview=document.getElementById('cardPreview'),catPreviewWrap=document.getElementById('catPreviewWrap'),catPreview=document.getElementById('catPreview'),entriesEl=document.getElementById('entries'),emptyEl=document.getElementById('empty'),searchInput=document.getElementById('search'),countEl=document.getElementById('count'),showAllBtn=document.getElementById('showAll'),showFavBtn=document.getElementById('showFav'),template=document.getElementById('entryTemplate'),clearFormBtn=document.getElementById('clearForm'),exportBtn=document.getElementById('exportBtn'),importFile=document.getElementById('importFile');
let entries=loadEntries(),cardPhotoData='',catPhotoData='',favoritesOnly=false;dateInput.valueAsDate=new Date();renderEntries();
tabs.forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.dataset.tab)));
cardPhotoInput.addEventListener('change',async e=>{cardPhotoData=await fileToDataUrl(e.target.files[0]);showPreview(cardPhotoData,cardPreview,cardPreviewWrap)});
catPhotoInput.addEventListener('change',async e=>{catPhotoData=await fileToDataUrl(e.target.files[0]);showPreview(catPhotoData,catPreview,catPreviewWrap)});
form.addEventListener('submit',e=>{e.preventDefault();entries.unshift({id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())),date:dateInput.value,phrase:phraseInput.value.trim(),reading:readingInput.value.trim(),tags:tagsInput.value.split(',').map(t=>t.trim()).filter(Boolean),memo:memoInput.value.trim(),cardPhoto:cardPhotoData,catPhoto:catPhotoData,favorite:false,createdAt:new Date().toISOString()});saveEntries();resetForm();renderEntries();switchTab('library')});
clearFormBtn.addEventListener('click',resetForm);searchInput.addEventListener('input',renderEntries);
showAllBtn.addEventListener('click',()=>{favoritesOnly=false;showAllBtn.classList.add('active');showFavBtn.classList.remove('active');renderEntries()});
showFavBtn.addEventListener('click',()=>{favoritesOnly=true;showFavBtn.classList.add('active');showAllBtn.classList.remove('active');renderEntries()});
exportBtn.addEventListener('click',()=>{const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`yuruneko-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url)});
importFile.addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;try{entries=JSON.parse(await file.text());if(!Array.isArray(entries))throw new Error();saveEntries();renderEntries();alert('控えを読み込みました')}catch{alert('読み込めませんでした')}});
function resetForm(){form.reset();dateInput.valueAsDate=new Date();cardPhotoData='';catPhotoData='';cardPreviewWrap.classList.add('hidden');catPreviewWrap.classList.add('hidden')}
function renderEntries(){const q=searchInput.value.trim().toLowerCase();const filtered=entries.filter(en=>{const text=[en.date,en.phrase,en.reading,en.memo,...(en.tags||[])].join(' ').toLowerCase();return(!q||text.includes(q))&&(!favoritesOnly||en.favorite)});entriesEl.innerHTML='';countEl.textContent=`${filtered.length}枚`;emptyEl.style.display=filtered.length?'none':'block';filtered.forEach(en=>{const node=template.content.cloneNode(true);node.querySelector('time').textContent=formatDate(en.date);node.querySelector('h3').textContent=en.phrase;const fav=node.querySelector('.fav');fav.textContent=en.favorite?'★':'☆';fav.classList.toggle('on',en.favorite);const grid=node.querySelector('.photoGrid');addPhoto(grid,en.cardPhoto,'カード写真');addPhoto(grid,en.catPhoto,'ねこ写真');const reading=node.querySelector('.reading');reading.textContent=en.reading||'';reading.style.display=en.reading?'block':'none';const memo=node.querySelector('.memo');memo.textContent=en.memo||'';memo.style.display=en.memo?'block':'none';const tagList=node.querySelector('.tagList');(en.tags||[]).forEach(tag=>{const s=document.createElement('span');s.className='tag';s.textContent=tag;tagList.appendChild(s)});fav.addEventListener('click',()=>{en.favorite=!en.favorite;saveEntries();renderEntries()});node.querySelector('.deleteBtn').addEventListener('click',()=>{if(confirm('この一枚を削除しますか？')){entries=entries.filter(e=>e.id!==en.id);saveEntries();renderEntries()}});entriesEl.appendChild(node)})}
function addPhoto(parent,src,alt){if(!src)return;const img=document.createElement('img');img.src=src;img.alt=alt;parent.appendChild(img)}
function showPreview(data,img,wrap){if(!data)return;img.src=data;wrap.classList.remove('hidden')}
function fileToDataUrl(file){return new Promise(resolve=>{if(!file)return resolve('');const r=new FileReader();r.onload=()=>resolve(r.result);r.readAsDataURL(file)})}
function saveEntries(){localStorage.setItem(STORAGE_KEY,JSON.stringify(entries))}
function loadEntries(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch{return[]}}
function formatDate(value){if(!value)return'';return new Date(value+'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}
function switchTab(name){tabs.forEach(t=>t.classList.toggle('active',t.dataset.tab===name));panels.forEach(p=>p.classList.toggle('active',p.id===name))}
</script>
</body></html>
