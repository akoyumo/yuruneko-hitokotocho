<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#c9f6ff">
<title>ゆるねこ一言帖</title>
<style>
:root{
  --bg:#eafbff;--cream:#fff8d8;--card:#fff;--ink:#292b36;--sub:#6f7e87;
  --blue:#72c7df;--blue2:#e8fbff;--line:#d6edf4;--pink:#ffedf5;
  --shadow:0 14px 34px rgba(83,145,164,.20);--radius:28px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;padding:18px 14px 50px;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 0 0,#c9f6ff 0 32%,transparent 52%),
    radial-gradient(circle at 100% 100%,#fff2c8 0 28%,transparent 55%),
    linear-gradient(135deg,var(--bg),#fff);
}
.app{max-width:760px;margin:0 auto}
.box,.entry{
  background:rgba(255,255,255,.95);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin:0 0 16px;
}
.eyebrow{font-size:13px;font-weight:900;letter-spacing:.2em;color:#367d90}
h1{font-size:clamp(42px,11vw,70px);line-height:1;margin:8px 0 16px;letter-spacing:-.04em}
h2{font-size:28px;margin:0 0 16px}
p{line-height:1.65}.cat{font-size:52px;margin:0 0 10px}
.motto{display:inline-block;margin-top:10px;padding:12px 16px;border-radius:999px;background:var(--blue2);border:1px solid var(--line);font-weight:900;color:#347b8e}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
.tab{border:1px solid var(--line);border-radius:999px;background:#fff;color:#347b8e;font-weight:900;padding:13px 6px;font-size:15px}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 10px 22px rgba(114,199,223,.35)}
.panel{display:none}.panel.on{display:block}
label{display:block;margin:16px 0 7px;font-weight:900}
input,textarea,select{
  width:100%;border:1px solid var(--line);border-radius:17px;background:#fff;padding:14px;
  font:inherit;font-size:16px;color:var(--ink)
}
textarea{min-height:90px;resize:vertical}
input[type=file]{padding:10px}
.preview{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:20px;background:#fbfeff}
.preview img,.entry img{width:100%;display:block;border-radius:18px;max-height:620px;object-fit:contain;background:#f8fdff}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
button{cursor:pointer}
.btn{border:1px solid var(--line);border-radius:999px;font-weight:900;font-size:16px;padding:13px 17px;background:#fff;color:#347b8e}
.primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 10px 22px rgba(114,199,223,.35)}
.danger{color:#d05a75}
.note{background:#f6fcff;border:1px solid var(--line);border-radius:22px;color:var(--sub);padding:16px;line-height:1.7}
.ok{background:#f2fff8;border-color:#cbeedc;color:#26754f}
.warn{background:#fffaf0;border-color:#f2dfb7;color:#8a6420}
.libraryTop{display:flex;align-items:center;justify-content:space-between;gap:12px}.count{font-weight:900;color:#347b8e;font-size:24px}
.grid{display:grid;gap:14px;margin-top:14px}
.entry{padding:16px}
.date{font-weight:900;color:#347b8e}.time{font-size:13px;color:var(--sub);margin-top:2px}.name{color:var(--sub);font-size:14px;margin-top:3px}
.hitokoto{font-weight:900;font-size:23px;line-height:1.5;margin:12px 0}.meta{color:var(--sub);font-size:14px;white-space:pre-wrap;line-height:1.6}
.small{font-size:13px;color:var(--sub);text-align:center;margin-top:20px}.hide{display:none!important}
.status{font-size:14px;margin-top:8px;color:#347b8e;font-weight:900}
.dayGroup{font-size:20px;font-weight:900;color:#347b8e;margin:22px 0 8px}
.tagGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px}
.tagBox{
  display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;
  border-radius:999px;padding:11px 13px;font-weight:900;color:#347b8e
}
.tagBox input{width:auto;margin:0;accent-color:#72c7df}
.tagPill{display:inline-block;margin:6px 6px 0 0;padding:7px 10px;border-radius:999px;background:var(--blue2);border:1px solid var(--line);font-size:13px;font-weight:900;color:#347b8e}
@media(max-width:430px){body{padding:12px 14px 44px}.box{padding:20px}.tabs{grid-template-columns:repeat(4,1fr)}.tab{font-size:14px}.tagGrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main class="app">
<section class="box">
  <div class="eyebrow">MY LITTLE CAT NOTE</div>
  <h1>ゆるねこ一言帖</h1>
  <div class="cat">🐈</div>
  <p>一日一枚でも、何枚でも。今日の言葉を、ねこと一緒に残していく。</p>
  <div class="motto" id="motto">今日は、最初の一枚を迎える日。</div>
  <div class="status" id="saveStatus">保存庫を確認中…</div>
</section>

<nav class="tabs">
  <button class="tab on" data-tab="make">つくる</button>
  <button class="tab" data-tab="library">図書館</button>
  <button class="tab" data-tab="test">保存確認</button>
  <button class="tab" data-tab="backup">控え</button>
</nav>

<section id="make" class="panel on box">
  <h2>今日の一枚をつくる</h2>
  <form id="form">
    <label>日付</label><input id="date" type="date" required>
    <label>今日のカード名</label><input id="cardName" placeholder="例：吊るされた男 逆位置" required>
    <label>今日のねこ写真</label><input id="catPhoto" type="file" accept="image/*"><div id="catPreview" class="preview hide"></div>
    <label>ゆるねこ一言</label><textarea id="hitokoto" required placeholder="考える時間は、ここまで。あとは動こう。"></textarea>
    <label>カード解説メモ</label><textarea id="reading" placeholder="カードの意味、ソラさんの解説、自分の気づき"></textarea>
    <label>タグ 複数選択OK</label>
    <div class="tagGrid" id="tagGrid"></div>
    <label>ひとことメモ</label><textarea id="memo" placeholder="あとで思い出したいこと"></textarea>
    <div class="actions">
      <button class="btn primary" type="submit">今日はこれでいい</button>
      <button class="btn" type="button" id="clear">入力を空にする</button>
    </div>
    <div class="status" id="formStatus"></div>
  </form>
</section>

<section id="library" class="panel box">
  <div class="libraryTop"><h2>ゆるねこ図書館</h2><div class="count"><span id="count">0</span>枚</div></div>
  <input id="search" placeholder="一言・カード名・タグ・メモを検索">
  <div class="actions">
    <button class="btn" id="all">全部</button>
    <button class="btn" id="favOnly">お気に入り</button>
    <button class="btn" id="newFirst">新しい順</button>
    <button class="btn" id="oldFirst">古い順</button>
  </div>
  <div id="list" class="grid"></div>
</section>

<section id="test" class="panel box">
  <h2>保存確認</h2>
  <div class="note ok" id="testResult">保存庫の状態を確認します。</div>
  <div class="actions">
    <button class="btn primary" id="reloadCheck">保存枚数を確認</button>
    <button class="btn" id="makeTest">テストカードを1枚保存</button>
  </div>
  <p class="note warn">同じ日に何枚作ってもOK。内部では作成時刻も保存するので、並び順が崩れません。</p>
</section>

<section id="backup" class="panel box">
  <h2>控え</h2>
  <div class="note">保存先はこのiPhoneのブラウザ内です。さらに安心したい時は「控えを書き出す」でJSONを保存できます。</div>
  <div class="actions">
    <button class="btn primary" id="export">控えを書き出す</button>
    <label class="btn">控えを読み込む<input id="import" type="file" accept="application/json" style="display:none"></label>
    <button class="btn danger" id="wipe">全部消す</button>
  </div>
</section>
<div class="small">Version 7：8タグをチェック式に。複数選択OK。</div>
</main>

<script>
const DB_NAME='yuruneko_hitokoto_db_v7';
const STORE='entries';
const TAGS=['巡航速度','一歩','余裕','ごきげん','気づき','手放す','休む','ひとつずつ'];
let db=null, entries=[], catData='', filter='all', sort='new';
const $=id=>document.getElementById(id);
$('date').value=new Date().toISOString().slice(0,10);

function buildTags(){
  $('tagGrid').innerHTML=TAGS.map(t=>'<label class="tagBox"><input type="checkbox" name="tag" value="'+t+'">'+t+'</label>').join('');
}
buildTags();

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>show(b.dataset.tab));
function show(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===id));
  if(id==='library') render();
  if(id==='test') updateTest();
}

function openDB(){
  return new Promise((resolve,reject)=>{
    if(!('indexedDB' in window)){reject(new Error('IndexedDBが使えません'));return}
    const req=indexedDB.open(DB_NAME,1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        const s=d.createObjectStore(STORE,{keyPath:'id'});
        s.createIndex('date','date',{unique:false});
        s.createIndex('createdAt','createdAt',{unique:false});
      }
    };
    req.onsuccess=e=>{db=e.target.result;resolve(db)};
    req.onerror=()=>reject(req.error);
  });
}
function txStore(mode='readonly'){return db.transaction(STORE,mode).objectStore(STORE)}
function getAll(){
  return new Promise((resolve,reject)=>{
    const req=txStore().getAll();
    req.onsuccess=()=>resolve(req.result||[]);
    req.onerror=()=>reject(req.error);
  });
}
function putEntry(entry){
  return new Promise((resolve,reject)=>{
    const req=txStore('readwrite').put(entry);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function deleteEntry(id){
  return new Promise((resolve,reject)=>{
    const req=txStore('readwrite').delete(id);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function clearDB(){
  return new Promise((resolve,reject)=>{
    const req=txStore('readwrite').clear();
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
async function init(){
  try{
    await openDB();
    entries=await getAll();
    $('saveStatus').textContent='保存庫OK：現在 '+entries.length+' 枚';
    render();
  }catch(e){
    $('saveStatus').textContent='保存庫エラー：Safariで開いてください';
    alert('保存庫を開けませんでした。Safariで開いてください。');
  }
}
function readFile(file){return new Promise(r=>{if(!file)return r('');const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file)})}
function preview(el,src){if(!src){el.classList.add('hide');el.innerHTML='';return}el.classList.remove('hide');el.innerHTML='<img src="'+src+'">'}
$('catPhoto').onchange=async e=>{catData=await readFile(e.target.files[0]);preview($('catPreview'),catData)}
function selectedTags(){return [...document.querySelectorAll('input[name=tag]:checked')].map(x=>x.value)}
$('form').onsubmit=async e=>{
  e.preventDefault();
  const now=Date.now();
  const entry={
    id:String(now)+'-'+Math.random().toString(36).slice(2),
    date:$('date').value,
    createdAt:now,
    cardName:v('cardName'),
    catPhoto:catData,
    hitokoto:v('hitokoto'),
    reading:v('reading'),
    tags:selectedTags(),
    memo:v('memo'),
    fav:false
  };
  try{
    await putEntry(entry);
    entries=await getAll();
    reset();
    $('motto').textContent='今日の一枚が、図書館に入りました。';
    $('formStatus').textContent='保存しました。図書館に '+entries.length+' 枚あります。';
    render();
    show('library');
  }catch(err){
    alert('保存できませんでした。写真が大きすぎる可能性があります。');
  }
}
$('clear').onclick=reset;
$('search').oninput=render;
$('all').onclick=()=>{filter='all';render()}; $('favOnly').onclick=()=>{filter='fav';render()};
$('newFirst').onclick=()=>{sort='new';render()}; $('oldFirst').onclick=()=>{sort='old';render()};

function entryText(e){return [e.hitokoto,e.cardName,(Array.isArray(e.tags)?e.tags.join(' '):e.tags),e.memo,e.reading].join(' ').toLowerCase()}
function render(){
  $('count').textContent=entries.length;
  $('saveStatus').textContent='保存庫OK：現在 '+entries.length+' 枚';
  let q=$('search').value.trim().toLowerCase();
  let arr=[...entries];
  if(filter==='fav')arr=arr.filter(e=>e.fav);
  if(q)arr=arr.filter(e=>entryText(e).includes(q));
  arr.sort((a,b)=>sort==='new'?(b.createdAt||0)-(a.createdAt||0):(a.createdAt||0)-(b.createdAt||0));
  $('list').innerHTML='';
  if(!arr.length){$('list').innerHTML='<div class="note">まだ展示はありません。最初の一枚をつくろう。</div>';return}
  let lastDate='';
  arr.forEach(e=>{
    if(e.date!==lastDate){
      lastDate=e.date;
      const group=document.createElement('div');
      group.className='dayGroup';
      group.textContent=fmt(e.date);
      $('list').appendChild(group);
    }
    const tagHtml=(Array.isArray(e.tags)?e.tags:[]).map(t=>'<span class="tagPill">'+esc(t)+'</span>').join('');
    let div=document.createElement('article');div.className='entry';
    div.innerHTML='<div class="date">'+fmt(e.date)+'</div><div class="time">'+timeText(e.createdAt)+'</div><div class="name">'+esc(e.cardName)+'</div><div class="hitokoto">'+esc(e.hitokoto)+'</div>'
      +(e.catPhoto?'<img src="'+e.catPhoto+'">':'')
      +(tagHtml?'<div>'+tagHtml+'</div>':'')
      +(e.reading?'<div class="meta">解説メモ：'+esc(e.reading)+'</div>':'')
      +(e.memo?'<div class="meta">メモ：'+esc(e.memo)+'</div>':'')
      +'<div class="actions"><button class="btn fav">'+(e.fav?'★お気に入り':'☆お気に入り')+'</button><button class="btn danger del">削除</button></div>';
    div.querySelector('.fav').onclick=async()=>{e.fav=!e.fav;await putEntry(e);entries=await getAll();render()};
    div.querySelector('.del').onclick=async()=>{if(confirm('この一枚を削除しますか？')){await deleteEntry(e.id);entries=await getAll();render();updateTest()}};
    $('list').appendChild(div);
  });
}
async function updateTest(){
  if(db){entries=await getAll()}
  $('testResult').textContent='保存確認：現在 '+entries.length+' 枚保存されています。同じ日に何枚でも保存できます。';
}
$('reloadCheck').onclick=updateTest;
$('makeTest').onclick=async()=>{
  const now=Date.now();
  const test={id:String(now)+'-test',date:new Date().toISOString().slice(0,10),createdAt:now,cardName:'保存テスト',catPhoto:'',hitokoto:'これは保存テストです。',reading:'',tags:['巡航速度','一歩'],memo:'消えなければ成功',fav:false};
  await putEntry(test);entries=await getAll();render();updateTest();alert('テストカードを保存しました。');
}
$('export').onclick=async()=>{
  entries=await getAll();
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='yuruneko-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
$('import').onchange=async e=>{
  const f=e.target.files[0];if(!f)return;
  try{
    const data=JSON.parse(await f.text());
    if(!Array.isArray(data))throw new Error();
    for(const item of data){await putEntry(item)}
    entries=await getAll();render();updateTest();alert('読み込みました');
  }catch{alert('読み込めませんでした')}
}
$('wipe').onclick=async()=>{if(confirm('全部消しますか？')){await clearDB();entries=[];render();updateTest()}};
function reset(){
  $('form').reset();
  $('date').value=new Date().toISOString().slice(0,10);
  catData='';
  preview($('catPreview'),'');
  buildTags();
}
function v(id){return $(id).value.trim()} 
function fmt(d){return (d||'').replaceAll('-','/')} 
function timeText(ms){if(!ms)return'';const d=new Date(ms);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
init();
</script>
</body>
</html>
