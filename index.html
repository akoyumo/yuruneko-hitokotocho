<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#c9f6ff">
<title>ゆるねこ一言帖 Version 14</title>
<style>
:root{
  --bg:#eafbff;--card:#fff;--ink:#292b36;--sub:#6f7e87;
  --blue:#72c7df;--blue2:#e8fbff;--line:#d6edf4;--pink:#ffedf5;
  --shadow:0 14px 34px rgba(83,145,164,.20);--radius:28px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;padding:18px 14px 50px;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 0 0,#c9f6ff 0 32%,transparent 52%),
    radial-gradient(circle at 100% 100%,#fff2c8 0 28%,transparent 55%),
    linear-gradient(135deg,var(--bg),#fff);
}
.app{max-width:760px;margin:0 auto}
.box,.entry{
  background:rgba(255,255,255,.96);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:22px;
  margin:0 0 16px;
}
.eyebrow{font-size:13px;font-weight:900;letter-spacing:.2em;color:#367d90}
h1{font-size:clamp(42px,11vw,70px);line-height:1;margin:8px 0 16px;letter-spacing:-.04em}
h2{font-size:28px;margin:0 0 16px}
p{line-height:1.65}
.cat{font-size:52px;margin:0 0 10px}
.motto{display:inline-block;margin-top:10px;padding:12px 16px;border-radius:999px;background:var(--blue2);border:1px solid var(--line);font-weight:900;color:#347b8e}
.status{font-size:14px;margin-top:8px;color:#347b8e;font-weight:900}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
.tab{border:1px solid var(--line);border-radius:999px;background:#fff;color:#347b8e;font-weight:900;padding:13px 6px;font-size:15px}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 10px 22px rgba(114,199,223,.35)}
.panel{display:none}.panel.on{display:block}
label{display:block;margin:16px 0 7px;font-weight:900}
input,textarea{
  width:100%;border:1px solid var(--line);border-radius:17px;background:#fff;padding:14px;
  font:inherit;font-size:16px;color:var(--ink)
}
textarea{min-height:90px;resize:vertical}
input[type=file]{padding:10px}
.preview{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:20px;background:#fbfeff}
.preview img,.entry img,.detailPhoto{width:100%;display:block;border-radius:18px;max-height:680px;object-fit:contain;background:#f8fdff}
.tagGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px}
.tagBox{
  display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;
  border-radius:999px;padding:11px 13px;font-weight:900;color:#347b8e
}
.tagBox input{width:auto;margin:0;accent-color:#72c7df}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
button{cursor:pointer}
.btn{border:1px solid var(--line);border-radius:999px;font-weight:900;font-size:16px;padding:13px 17px;background:#fff;color:#347b8e}
.primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 10px 22px rgba(114,199,223,.35)}
.danger{color:#d05a75}
.note{background:#f6fcff;border:1px solid var(--line);border-radius:22px;color:var(--sub);padding:16px;line-height:1.7}
.ok{background:#f2fff8;border-color:#cbeedc;color:#26754f}
.warn{background:#fffaf0;border-color:#f2dfb7;color:#8a6420}
.libraryTop{display:flex;align-items:center;justify-content:space-between;gap:12px}
.count{font-weight:900;color:#347b8e;font-size:24px}
.grid{display:grid;gap:14px;margin-top:14px}
.entry{padding:16px;cursor:pointer}
.entry:active{transform:scale(.995)}
.entryMini{display:grid;grid-template-columns:92px 1fr;gap:13px;align-items:start}
.thumb{width:92px;height:92px;border-radius:18px;object-fit:cover;background:#f8fdff;border:1px solid var(--line)}
.thumbEmpty{display:flex;align-items:center;justify-content:center;color:#9ab0b8;font-weight:900}
.date{font-weight:900;color:#347b8e}
.time{font-size:13px;color:var(--sub);margin-top:2px}
.name{color:var(--sub);font-size:14px;margin-top:3px}
.hitokoto{font-weight:900;font-size:20px;line-height:1.45;margin:8px 0}
.detailHitokoto{font-weight:900;font-size:25px;line-height:1.5;margin:14px 0}
.meta{color:var(--sub);font-size:14px;white-space:pre-wrap;line-height:1.6}
.tagPill{display:inline-block;margin:6px 6px 0 0;padding:7px 10px;border-radius:999px;background:var(--blue2);border:1px solid var(--line);font-size:13px;font-weight:900;color:#347b8e}
.detailSection{margin-top:14px;padding:12px;border-radius:18px;background:#f8fdff;border:1px solid var(--line)}
.detailTitle{font-weight:900;color:#347b8e;margin:2px 0 6px}
.small{font-size:13px;color:var(--sub);text-align:center;margin-top:20px}
.hide{display:none!important}
.backBtn{margin-bottom:14px}
@media(max-width:430px){
  body{padding:12px 14px 44px}
  .box{padding:20px}
  .tabs{grid-template-columns:repeat(4,1fr)}
  .tab{font-size:14px}
  .tagGrid{grid-template-columns:1fr 1fr}
  .entryMini{grid-template-columns:84px 1fr}
  .thumb{width:84px;height:84px}
}
</style>
</head>
<body>
<main class="app">
<section class="box">
  <div class="eyebrow">MY LITTLE CAT NOTE</div>
  <h1>ゆるねこ一言帖</h1>
  <div class="cat">🐈</div>
  <p>一日一枚でも、何枚でも。今日の言葉を、ねこと一緒に残していく。</p>
  <div class="motto" id="motto">最初の一枚を迎える日。</div>
  <div class="status" id="saveStatus">保存庫を確認中…</div>
</section>

<nav class="tabs">
  <button class="tab on" data-tab="make">つくる</button>
  <button class="tab" data-tab="library">図書館</button>
  <button class="tab" data-tab="test">保存確認</button>
  <button class="tab" data-tab="backup">控え</button>
</nav>

<section id="make" class="panel on box">
  <h2 id="formTitle">一枚をつくる</h2>
  <form id="form">
    <label>日付</label>
    <input id="date" type="date" required>

    <label>カード名</label>
    <input id="cardName" placeholder="例：吊るされた男 逆位置" required>

    <label>タグ</label>
    <div class="tagGrid" id="tagGrid"></div>

    <label>ねこ写真</label>
    <input id="catPhoto" type="file" accept="image/*">
    <div id="catPreview" class="preview hide"></div>

    <label>ゆるねこ一言</label>
    <textarea id="hitokoto" required placeholder="考える時間は、ここまで。あとは動こう。"></textarea>

    <label>カード解説メモ</label>
    <textarea id="reading" placeholder="カードの意味、ソラさんの解説、自分の気づき"></textarea>

    <label>ひとことメモ</label>
    <textarea id="memo" placeholder="あとで思い出したいこと"></textarea>

    <div class="actions">
      <button class="btn primary" type="submit" id="submitBtn">今日はこれでいい</button>
      <button class="btn" type="button" id="clear">入力を空にする</button>
      <button class="btn danger hide" type="button" id="cancelEdit">編集をやめる</button>
    </div>
    <div class="status" id="formStatus"></div>
  </form>
</section>

<section id="library" class="panel box">
  <div id="libraryListView">
    <div class="libraryTop"><h2>ゆるねこ図書館</h2><div class="count"><span id="count">0</span>枚</div></div>
    <input id="search" placeholder="一言・カード名・タグ・メモを検索">
    <div class="actions">
      <button class="btn" id="all">全部</button>
      <button class="btn" id="favOnly">お気に入り</button>
      <button class="btn" id="newFirst">新しい順</button>
      <button class="btn" id="oldFirst">古い順</button>
    </div>
    <div id="list" class="grid"></div>
  </div>
  <div id="detailView" class="hide"></div>
</section>

<section id="test" class="panel box">
  <h2>保存確認</h2>
  <div class="note ok" id="testResult">保存庫の状態を確認します。</div>
  <div class="actions">
    <button class="btn primary" id="reloadCheck">保存枚数を確認</button>
    <button class="btn" id="makeTest">テストカードを1枚保存</button>
  </div>
  <p class="note warn">同じ日に何枚作ってもOK。内部では作成時刻も保存するので、並び順が崩れません。</p>
</section>

<section id="backup" class="panel box">
  <h2>控え</h2>
  <div class="note">保存先はこのiPhoneのブラウザ内です。さらに安心したい時は「控えを書き出す」でJSONを保存できます。</div>
  <div class="actions">
    <button class="btn primary" id="export">控えを書き出す</button>
    <label class="btn">控えを読み込む<input id="import" type="file" accept="application/json" style="display:none"></label>
    <button class="btn danger" id="wipe">全部消す</button>
  </div>
</section>

<div class="small">Version 14：カードをタップして詳細表示。保存・編集つき。</div>
</main>

<script>
const DB_NAME='yuruneko_hitokoto_db_v14';
const OLD_DBS=[
  'yuruneko_hitokoto_db_v13',
  'yuruneko_hitokoto_db_v12',
  'yuruneko_hitokoto_db_v11',
  'yuruneko_hitokoto_db_v10',
  'yuruneko_hitokoto_db_v9',
  'yuruneko_hitokoto_db_v7',
  'yuruneko_hitokoto_db_v6',
  'yuruneko_hitokoto_db_v5'
];
const STORE='entries';
const TAGS=['巡航速度','ひとつずつ','一歩','気づき','ごきげん','余裕','手放す','休む'];

let db=null;
let entries=[];
let catData='';
let filter='all';
let sort='new';
let editingId=null;
let originalCreatedAt=null;

const $=id=>document.getElementById(id);
$('date').value=new Date().toISOString().slice(0,10);

function buildTags(selected=[]){
  $('tagGrid').innerHTML=TAGS.map(t=>{
    return '<label class="tagBox"><input type="checkbox" name="tag" value="'+t+'" '+(selected.includes(t)?'checked':'')+'>'+t+'</label>';
  }).join('');
}
buildTags();

document.querySelectorAll('.tab').forEach(b=>{
  b.onclick=()=>show(b.dataset.tab);
});
function show(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===id));
  if(id==='library'){
    closeDetail();
    render();
  }
  if(id==='test') updateTest();
}

function openNamedDB(name){
  return new Promise((resolve,reject)=>{
    if(!('indexedDB' in window)){
      reject(new Error('IndexedDBが使えません'));
      return;
    }
    const req=indexedDB.open(name,1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE)){
        const s=d.createObjectStore(STORE,{keyPath:'id'});
        s.createIndex('date','date',{unique:false});
        s.createIndex('createdAt','createdAt',{unique:false});
      }
    };
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=()=>reject(req.error);
  });
}
function txStore(mode='readonly'){
  return db.transaction(STORE,mode).objectStore(STORE);
}
function getAll(){
  return new Promise((resolve,reject)=>{
    const req=txStore().getAll();
    req.onsuccess=()=>resolve(req.result||[]);
    req.onerror=()=>reject(req.error);
  });
}
function allFromDB(database){
  return new Promise((resolve,reject)=>{
    if(!database.objectStoreNames.contains(STORE)){
      resolve([]);
      return;
    }
    const req=database.transaction(STORE,'readonly').objectStore(STORE).getAll();
    req.onsuccess=()=>resolve(req.result||[]);
    req.onerror=()=>reject(req.error);
  });
}
function putEntry(entry){
  return new Promise((resolve,reject)=>{
    const req=txStore('readwrite').put(entry);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function deleteEntry(id){
  return new Promise((resolve,reject)=>{
    const req=txStore('readwrite').delete(id);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function clearDB(){
  return new Promise((resolve,reject)=>{
    const req=txStore('readwrite').clear();
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}
function normalizeEntry(item){
  const now=Date.now();
  let tags=item.tags;
  if(typeof tags==='string'){
    tags=tags.split(/[、,\s]+/).filter(Boolean);
  }
  if(!Array.isArray(tags)) tags=[];
  return {
    id:item.id || String(now)+'-'+Math.random().toString(36).slice(2),
    date:item.date || new Date().toISOString().slice(0,10),
    createdAt:item.createdAt || now,
    updatedAt:item.updatedAt || undefined,
    cardName:item.cardName || '',
    catPhoto:item.catPhoto || '',
    hitokoto:item.hitokoto || '',
    reading:item.reading || '',
    tags:tags,
    memo:item.memo || '',
    fav:!!item.fav
  };
}
async function migrateOldData(){
  let current=await getAll();
  if(current.length) return;

  for(const name of OLD_DBS){
    try{
      const old=await openNamedDB(name);
      const data=await allFromDB(old);
      old.close();
      if(data.length){
        for(const item of data){
          await putEntry(normalizeEntry(item));
        }
        return;
      }
    }catch(e){}
  }
}
async function init(){
  try{
    db=await openNamedDB(DB_NAME);
    await migrateOldData();
    entries=await getAll();
    updateStatus();
    render();
  }catch(e){
    $('saveStatus').textContent='保存庫エラー：Safariで開いてください';
    alert('保存庫を開けませんでした。Safariで開いてください。');
  }
}
function updateStatus(){
  $('saveStatus').textContent='図書館：'+entries.length+'枚';
  $('count').textContent=entries.length;
}
function readFile(file){
  return new Promise(resolve=>{
    if(!file){
      resolve('');
      return;
    }
    const fr=new FileReader();
    fr.onload=()=>resolve(fr.result);
    fr.readAsDataURL(file);
  });
}
function preview(el,src){
  if(!src){
    el.classList.add('hide');
    el.innerHTML='';
    return;
  }
  el.classList.remove('hide');
  el.innerHTML='<img src="'+src+'">';
}
$('catPhoto').onchange=async e=>{
  catData=await readFile(e.target.files[0]);
  preview($('catPreview'),catData);
}
function selectedTags(){
  return [...document.querySelectorAll('input[name=tag]:checked')].map(x=>x.value);
}

$('form').onsubmit=async e=>{
  e.preventDefault();
  const now=Date.now();
  const old=editingId ? entries.find(x=>x.id===editingId) : null;
  const entry={
    id:editingId || String(now)+'-'+Math.random().toString(36).slice(2),
    date:$('date').value,
    createdAt:originalCreatedAt || now,
    updatedAt:editingId ? now : undefined,
    cardName:v('cardName'),
    catPhoto:catData || (old ? old.catPhoto : ''),
    hitokoto:v('hitokoto'),
    reading:v('reading'),
    tags:selectedTags(),
    memo:v('memo'),
    fav:old ? !!old.fav : false
  };
  try{
    await putEntry(entry);
    entries=await getAll();
    reset();
    $('motto').textContent=editingId?'一枚を編集しました。':'一枚が、図書館に入りました。';
    $('formStatus').textContent='保存しました。図書館に '+entries.length+' 枚あります。';
    render();
    show('library');
  }catch(err){
    alert('保存できませんでした。写真が大きすぎる可能性があります。');
  }
};

$('clear').onclick=reset;
$('cancelEdit').onclick=reset;
$('search').oninput=render;
$('all').onclick=()=>{filter='all';render()};
$('favOnly').onclick=()=>{filter='fav';render()};
$('newFirst').onclick=()=>{sort='new';render()};
$('oldFirst').onclick=()=>{sort='old';render()};

function entryText(e){
  return [e.hitokoto,e.cardName,(Array.isArray(e.tags)?e.tags.join(' '):e.tags),e.memo,e.reading].join(' ').toLowerCase();
}
function sortedFilteredEntries(){
  let q=$('search').value.trim().toLowerCase();
  let arr=[...entries];

  if(filter==='fav') arr=arr.filter(e=>e.fav);
  if(q) arr=arr.filter(e=>entryText(e).includes(q));

  arr.sort((a,b)=>{
    return sort==='new' ? (b.createdAt||0)-(a.createdAt||0) : (a.createdAt||0)-(b.createdAt||0);
  });
  return arr;
}
function render(){
  updateStatus();
  const arr=sortedFilteredEntries();

  $('list').innerHTML='';
  if(!arr.length){
    $('list').innerHTML='<div class="note">まだ展示はありません。最初の一枚をつくろう。</div>';
    return;
  }

  arr.forEach(e=>{
    const tagHtml=(Array.isArray(e.tags)?e.tags:[]).slice(0,3).map(t=>'<span class="tagPill">'+esc(t)+'</span>').join('');
    const div=document.createElement('article');
    div.className='entry';
    div.innerHTML=
      '<div class="entryMini">'+
        (e.catPhoto?'<img class="thumb" src="'+e.catPhoto+'">':'<div class="thumb thumbEmpty">no image</div>')+
        '<div>'+
          '<div class="date">'+fmt(e.date)+'</div>'+
          '<div class="time">'+timeText(e.createdAt)+(e.updatedAt?' ／ 編集済み':'')+'</div>'+
          '<div class="name">'+esc(e.cardName)+'</div>'+
          '<div class="hitokoto">'+esc(e.hitokoto)+'</div>'+
          (tagHtml?'<div>'+tagHtml+'</div>':'')+
          '<div class="meta">タップして詳細を見る</div>'+
        '</div>'+
      '</div>';
    div.onclick=()=>openDetail(e.id);
    $('list').appendChild(div);
  });
}
function openDetail(id){
  const e=entries.find(x=>x.id===id);
  if(!e) return;
  const tagHtml=(Array.isArray(e.tags)?e.tags:[]).map(t=>'<span class="tagPill">'+esc(t)+'</span>').join('');
  $('libraryListView').classList.add('hide');
  $('detailView').classList.remove('hide');
  $('detailView').innerHTML=
    '<button class="btn backBtn" id="backToList">← 図書館へ戻る</button>'+
    '<article class="entry">'+
      '<div class="date">'+fmt(e.date)+'</div>'+
      '<div class="time">'+timeText(e.createdAt)+(e.updatedAt?' ／ 編集済み':'')+'</div>'+
      '<div class="name">'+esc(e.cardName)+'</div>'+
      '<div class="detailHitokoto">'+esc(e.hitokoto)+'</div>'+
      (e.catPhoto?'<img class="detailPhoto" src="'+e.catPhoto+'">':'')+
      (tagHtml?'<div>'+tagHtml+'</div>':'')+
      '<div class="detailSection">'+
        '<div class="detailTitle">カード解説メモ</div>'+
        '<div class="meta">'+(e.reading?esc(e.reading):'（未入力）')+'</div>'+
      '</div>'+
      '<div class="detailSection">'+
        '<div class="detailTitle">ひとことメモ</div>'+
        '<div class="meta">'+(e.memo?esc(e.memo):'（未入力）')+'</div>'+
      '</div>'+
      '<div class="actions">'+
        '<button class="btn fav">'+(e.fav?'★お気に入り':'☆お気に入り')+'</button>'+
        '<button class="btn edit">編集</button>'+
        '<button class="btn danger del">削除</button>'+
      '</div>'+
    '</article>';
  $('backToList').onclick=closeDetail;
  $('detailView').querySelector('.fav').onclick=async()=>{
    e.fav=!e.fav;
    await putEntry(e);
    entries=await getAll();
    openDetail(e.id);
    render();
  };
  $('detailView').querySelector('.edit').onclick=()=>startEdit(e);
  $('detailView').querySelector('.del').onclick=async()=>{
    if(confirm('この一枚を削除しますか？')){
      await deleteEntry(e.id);
      entries=await getAll();
      closeDetail();
      render();
      updateTest();
    }
  };
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeDetail(){
  $('detailView').classList.add('hide');
  $('detailView').innerHTML='';
  $('libraryListView').classList.remove('hide');
}
function startEdit(e){
  editingId=e.id;
  originalCreatedAt=e.createdAt;
  $('formTitle').textContent='この一枚を編集する';
  $('submitBtn').textContent='編集を保存する';
  $('cancelEdit').classList.remove('hide');

  $('date').value=e.date || new Date().toISOString().slice(0,10);
  $('cardName').value=e.cardName || '';
  $('hitokoto').value=e.hitokoto || '';
  $('reading').value=e.reading || '';
  $('memo').value=e.memo || '';
  catData=e.catPhoto || '';
  preview($('catPreview'),catData);
  buildTags(Array.isArray(e.tags)?e.tags:[]);

  show('make');
  window.scrollTo({top:0,behavior:'smooth'});
}
async function updateTest(){
  if(db) entries=await getAll();
  updateStatus();
  $('testResult').textContent='保存確認：現在 '+entries.length+' 枚保存されています。同じ日に何枚でも保存できます。';
}
$('reloadCheck').onclick=updateTest;
$('makeTest').onclick=async()=>{
  const now=Date.now();
  const test={
    id:String(now)+'-test',
    date:new Date().toISOString().slice(0,10),
    createdAt:now,
    cardName:'保存テスト',
    catPhoto:'',
    hitokoto:'これは保存テストです。',
    reading:'詳細画面のテストです。',
    tags:['巡航速度','一歩'],
    memo:'ここが見えれば成功。',
    fav:false
  };
  await putEntry(test);
  entries=await getAll();
  render();
  updateTest();
  alert('テストカードを保存しました。');
}
$('export').onclick=async()=>{
  entries=await getAll();
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='yuruneko-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}
$('import').onchange=async e=>{
  const f=e.target.files[0];
  if(!f) return;
  try{
    const data=JSON.parse(await f.text());
    if(!Array.isArray(data)) throw new Error();
    for(const item of data){
      await putEntry(normalizeEntry(item));
    }
    entries=await getAll();
    render();
    updateTest();
    alert('読み込みました');
  }catch{
    alert('読み込めませんでした');
  }
}
$('wipe').onclick=async()=>{
  if(confirm('全部消しますか？')){
    await clearDB();
    entries=[];
    closeDetail();
    render();
    updateTest();
  }
}
function reset(){
  editingId=null;
  originalCreatedAt=null;
  $('formTitle').textContent='一枚をつくる';
  $('submitBtn').textContent='今日はこれでいい';
  $('cancelEdit').classList.add('hide');
  $('form').reset();
  $('date').value=new Date().toISOString().slice(0,10);
  catData='';
  preview($('catPreview'),'');
  buildTags();
}
function v(id){return $(id).value.trim()}
function fmt(d){return (d||'').replaceAll('-','/')}
function timeText(ms){
  if(!ms) return '';
  const d=new Date(ms);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function esc(s){
  return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
init();
</script>
