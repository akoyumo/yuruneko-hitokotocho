<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ゆるねこ一言帖</title>
<style>
:root{--bg:#eafbff;--card:#fff;--ink:#2d2f3a;--sub:#73828b;--blue:#76c7df;--line:#d8edf3;--shadow:0 14px 34px rgba(94,150,168,.20)}
*{box-sizing:border-box}
body{margin:0;padding:18px 14px 50px;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;color:var(--ink);background:linear-gradient(135deg,#d9f8ff,#fff9dc 70%,#fff)}
.app{max-width:720px;margin:0 auto}
.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:22px;margin:0 0 16px}
h1{font-size:44px;line-height:1;margin:8px 0 14px} h2{font-size:26px;margin:0 0 16px}
.eyebrow{font-size:13px;font-weight:900;letter-spacing:.2em;color:#377e91}.motto{display:inline-block;margin-top:10px;padding:12px 16px;border-radius:999px;background:#f4fdff;border:1px solid var(--line);font-weight:900;color:#347b8e}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:0 0 16px}
.tab{border:1px solid var(--line);border-radius:999px;background:#fff;color:#347b8e;font-weight:900;padding:13px 8px;font-size:16px}
.tab.on{background:var(--blue);color:white;border-color:var(--blue)}
.panel{display:none}.panel.on{display:block}
label{display:block;margin:16px 0 7px;font-weight:900}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:17px;background:#fff;padding:14px;font:inherit;font-size:16px}
textarea{min-height:90px}
input[type=file]{padding:10px}
.preview{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:20px;background:#fbfeff}
.preview img,.entry img{width:100%;display:block;border-radius:17px;max-height:520px;object-fit:contain;background:#f8fdff}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
button{cursor:pointer}
.btn{border:1px solid var(--line);border-radius:999px;font-weight:900;font-size:16px;padding:13px 17px;background:#fff;color:#347b8e}
.primary{background:var(--blue);border-color:var(--blue);color:white;box-shadow:0 10px 22px rgba(118,199,223,.35)}
.danger{color:#d05a75}
.note{background:#f6fcff;border:1px solid var(--line);border-radius:22px;color:var(--sub);padding:16px;line-height:1.7}
.libraryTop{display:flex;align-items:center;justify-content:space-between;gap:12px}.count{font-weight:900;color:#347b8e;font-size:22px}
.grid{display:grid;gap:14px;margin-top:14px}
.entry{background:#fff;border:1px solid var(--line);border-radius:24px;padding:15px;box-shadow:var(--shadow)}
.date{font-weight:900;color:#347b8e}.name{color:var(--sub);font-size:14px;margin-top:3px}
.hitokoto{font-weight:900;font-size:22px;line-height:1.5;margin:12px 0}.meta{color:var(--sub);font-size:14px;white-space:pre-wrap;line-height:1.6}
.small{font-size:13px;color:var(--sub);text-align:center;margin-top:20px}
.hide{display:none}
</style>
</head>
<body>
<main class="app">
  <section class="card">
    <div class="eyebrow">MY LITTLE CAT NOTE</div>
    <h1>ゆるねこ一言帖 🐈</h1>
    <p>今日の一枚をつくり、言葉を展示し、未来の自分にそっと渡す。</p>
    <div class="motto" id="motto">今日は、最初の一枚を迎える日。</div>
  </section>

  <nav class="tabs">
    <button class="tab on" data-tab="make">つくる</button>
    <button class="tab" data-tab="library">図書館</button>
    <button class="tab" data-tab="backup">控え</button>
  </nav>

  <section id="make" class="panel on card">
    <h2>今日の一枚をつくる</h2>
    <form id="form">
      <label>日付</label><input id="date" type="date" required>
      <label>今日のカード名</label><input id="cardName" placeholder="例：皇帝 逆位置" required>
      <label>今日のカード写真</label><input id="cardPhoto" type="file" accept="image/*"><div id="cardPreview" class="preview hide"></div>
      <label>今日のねこ写真</label><input id="catPhoto" type="file" accept="image/*"><div id="catPreview" class="preview hide"></div>
      <label>ゆるねこ一言</label><textarea id="hitokoto" required placeholder="完璧じゃなくても、とりあえず始めよう。"></textarea>
      <label>カード解説メモ</label><textarea id="reading" placeholder="カードの意味、ソラさんの解説、自分の気づき"></textarea>
      <label>タグ</label><input id="tags" placeholder="七夕, スタート, 余裕">
      <label>ひとことメモ</label><textarea id="memo" placeholder="あとで思い出したいこと"></textarea>
      <div class="actions">
        <button class="btn primary" type="submit">今日はこれでいい</button>
        <button class="btn" type="button" id="clear">入力を空にする</button>
      </div>
    </form>
  </section>

  <section id="library" class="panel card">
    <div class="libraryTop"><h2>ゆるねこ図書館</h2><div class="count"><span id="count">0</span>枚</div></div>
    <input id="search" placeholder="一言・カード名・タグ・メモを検索">
    <div class="actions">
      <button class="btn" id="all">全部</button>
      <button class="btn" id="favOnly">お気に入り</button>
      <button class="btn" id="newFirst">新しい順</button>
      <button class="btn" id="oldFirst">古い順</button>
    </div>
    <div id="list" class="grid"></div>
  </section>

  <section id="backup" class="panel card">
    <h2>控え</h2>
    <div class="note">保存はこのiPhoneのSafari内に残ります。月に一回くらい「控えを書き出す」を押すと安心です。</div>
    <div class="actions">
      <button class="btn primary" id="export">控えを書き出す</button>
      <label class="btn">控えを読み込む<input id="import" type="file" accept="application/json" style="display:none"></label>
      <button class="btn danger" id="wipe">全部消す</button>
    </div>
  </section>
  <div class="small">Version 4：完成版。保存つき。</div>
</main>
<script>
const KEY='yuruneko_easy_v3';
let entries=load(), cardData='', catData='', filter='all', sort='new';
const $=id=>document.getElementById(id);
$('date').value=new Date().toISOString().slice(0,10);

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>show(b.dataset.tab));
function show(id){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===id));
  if(id==='library') render();
}
function readFile(file){return new Promise(r=>{if(!file)return r('');const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file)})}
function preview(el,src){if(!src){el.classList.add('hide');el.innerHTML='';return}el.classList.remove('hide');el.innerHTML='<img src="'+src+'">'}
$('cardPhoto').onchange=async e=>{cardData=await readFile(e.target.files[0]);preview($('cardPreview'),cardData)}
$('catPhoto').onchange=async e=>{catData=await readFile(e.target.files[0]);preview($('catPreview'),catData)}
$('form').onsubmit=e=>{
  e.preventDefault();
  entries.push({
    id:String(Date.now()), date:$('date').value, cardName:v('cardName'), cardPhoto:cardData, catPhoto:catData,
    hitokoto:v('hitokoto'), reading:v('reading'), tags:v('tags'), memo:v('memo'), fav:false, createdAt:Date.now()
  });
  save(); reset(); $('motto').textContent='今日の一枚が、図書館に入りました。'; show('library');
}
$('clear').onclick=reset;
$('search').oninput=render;
$('all').onclick=()=>{filter='all';render()}; $('favOnly').onclick=()=>{filter='fav';render()};
$('newFirst').onclick=()=>{sort='new';render()}; $('oldFirst').onclick=()=>{sort='old';render()};

function render(){
  $('count').textContent=entries.length;
  let q=$('search').value.trim().toLowerCase();
  let arr=[...entries];
  if(filter==='fav')arr=arr.filter(e=>e.fav);
  if(q)arr=arr.filter(e=>(e.hitokoto+e.cardName+e.tags+e.memo+e.reading).toLowerCase().includes(q));
  arr.sort((a,b)=>sort==='new'?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date));
  $('list').innerHTML='';
  if(!arr.length){$('list').innerHTML='<div class="note">まだ展示はありません。最初の一枚をつくろう。</div>';return}
  arr.forEach(e=>{
    let div=document.createElement('article');div.className='entry';
    div.innerHTML='<div class="date">'+fmt(e.date)+'</div><div class="name">'+esc(e.cardName)+'</div><div class="hitokoto">'+esc(e.hitokoto)+'</div>'
      +(e.catPhoto?'<img src="'+e.catPhoto+'">':(e.cardPhoto?'<img src="'+e.cardPhoto+'">':''))
      +(e.reading?'<div class="meta">解説メモ：'+esc(e.reading)+'</div>':'')
      +(e.tags?'<div class="meta">タグ：'+esc(e.tags)+'</div>':'')
      +(e.memo?'<div class="meta">メモ：'+esc(e.memo)+'</div>':'')
      +'<div class="actions"><button class="btn fav">'+(e.fav?'★お気に入り':'☆お気に入り')+'</button><button class="btn danger del">削除</button></div>';
    div.querySelector('.fav').onclick=()=>{e.fav=!e.fav;save();render()};
    div.querySelector('.del').onclick=()=>{if(confirm('この一枚を削除しますか？')){entries=entries.filter(x=>x.id!==e.id);save();render()}};
    $('list').appendChild(div);
  });
}
$('export').onclick=()=>{
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='yuruneko-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
$('import').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{entries=JSON.parse(await f.text());save();render();alert('読み込みました')}catch{alert('読み込めませんでした')}};
$('wipe').onclick=()=>{if(confirm('全部消しますか？')){entries=[];save();render()}};
function reset(){ $('form').reset(); $('date').value=new Date().toISOString().slice(0,10); cardData=''; catData=''; preview($('cardPreview'),''); preview($('catPreview'),'') }
function v(id){return $(id).value.trim()} function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return []}} function save(){localStorage.setItem(KEY,JSON.stringify(entries))}
function fmt(d){return (d||'').replaceAll('-','/')} function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
render();
</script>
</body>
</html>
